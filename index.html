<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>波克 POKER | 純情可愛的撲克貓咪</title>
    <style>
        /* CSS 變數：定義銀白主題色 */
        :root {
            --bg-dark: #07030a; 
            --primary-silver: #a1a1aa; /* 基礎銀色 */
            --light-silver: #e4e4e7;   /* 亮白銀色 */
            --neon-silver: #ffffff;    /* 霓虹白色 */
            --text-main: #f8fafc;
            --text-muted: #d1d5db;
        }

        /* 基礎設定與重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* 優化銀白色系背景漸層 */
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(228, 228, 231, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(255, 255, 255, 0.05) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, #1e1b21 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 3rem 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; 
        }

        /* 👑 標題樣式 */
        .hero-title {
            text-align: center;
            animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 10;
        }

        .hero-title h1 {
            /* 使用 clamp 讓字體在手機和電腦間流暢縮放 */
            font-size: clamp(3.5rem, 8vw, 6rem); 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 1;
            margin-bottom: 0.5rem;
            
            /* 相容 Safari 的文字漸層設定 */
            background: linear-gradient(135deg, #fff 0%, var(--primary-silver) 45%, var(--light-silver) 50%, #fff 55%, var(--primary-silver) 100%);
            background-size: 200% auto;
            color: #fff; /* Fallback */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;

            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(228, 228, 231, 0.3),
                0 0 40px rgba(228, 228, 231, 0.1);
        }

        .hero-title p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--light-silver);
            font-weight: 700;
            letter-spacing: clamp(4px, 1.5vw, 10px); 
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            margin-top: -5px;
            margin-left: 10px; 
        }

        /* 📸 中間圖片區塊：純漂浮 */
        .image-showcase {
            position: relative;
            width: 100%;
            max-width: 550px; 
            aspect-ratio: 1 / 1; /* 保持正方形比例 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 1; 
            animation: floatOnly 6s ease-in-out infinite;
            pointer-events: none; /* 移除互動感 */
            will-change: transform; /* 提升手機版動畫效能 */
        }

        /* 大圖背後的發光暈 (銀白色系) */
        .image-showcase::before {
            content: '';
            position: absolute;
            width: 70%;
            height: 70%;
            background: linear-gradient(135deg, #fff, var(--primary-silver));
            filter: blur(80px);
            opacity: 0.25;
            border-radius: 50%;
            z-index: -1;
        }

        .character-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.8));
        }

        /* 📝 玻璃擬態資訊卡片 */
        .info-card {
            background: rgba(255, 255, 255, 0.03);
            /* Safari 需要 -webkit- 前綴 */
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: clamp(1.5rem, 5vw, 3rem); 
            width: 100%;
            max-width: 700px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.3s;
            z-index: 10;
        }

        .info-card h2 {
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 800;
            color: var(--light-silver);
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
            border-left: 4px solid var(--neon-silver); /* 左側飾條改為白色 */
            padding-left: 1rem;
            line-height: 1;
        }

        /* 🔄 自我介紹欄位 */
        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .info-list li {
            display: flex;
            align-items: center;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid transparent;
            
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .info-list li:hover {
            background: rgba(255, 255, 255, 0.05); /* 微微的白色背景 */
            border-color: rgba(255, 255, 255, 0.15); /* 微微的白色邊框 */
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .info-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            /* 左側發光條：銀白漸層 */
            background: linear-gradient(to bottom, #fff, var(--primary-silver));
            transition: width 0.3s ease;
            box-shadow: 0 0 15px #fff;
        }

        @media (hover: hover) {
            .info-list li:hover::before {
                width: 5px;
            }
            .info-list li:hover strong {
                color: #fff;
                text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            }
        }

        .info-list strong {
            color: var(--light-silver);
            width: 140px;
            flex-shrink: 0;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        /* 社群按鈕區塊 */
        .social-links {
            margin-top: clamp(1.5rem, 4vw, 2.5rem);
            display: flex;
            gap: 1.2rem;
            justify-content: flex-start;
            flex-wrap: wrap; 
        }

        .social-btn {
            text-decoration: none;
            color: var(--text-main);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            flex: 1 1 auto; 
            min-width: 150px; 
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 按鈕 Hover 的冷色漸層 */
            background: linear-gradient(45deg, #fff, var(--primary-silver));
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: translateY(-5px);
                box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
                border-color: transparent;
            }
            .social-btn:hover::before {
                opacity: 1;
            }
        }

        /* 針對小螢幕與平板的 RWD 調整 */
        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            .info-list li { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 0.5rem; 
                padding: 1.2rem; 
            }
            .info-list strong { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3rem;}
        }

        /* 針對極小螢幕手機的保護 (如 iPhone SE) */
        @media (max-width: 380px) {
            .social-links { flex-direction: column; }
            .social-btn { width: 100%; }
        }

        /* 關鍵格動畫 */
        @keyframes slideDownFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes floatOnly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="hero-title">
            <h1>波克</h1>
            <p>POKER</p>
        </header>

        <div class="image-showcase">
            <img src="profile.png" alt="波克 Poker 純情可愛的撲克貓咪" class="character-img">
        </div>

        <div class="info-card">
            <h2>自我介紹</h2>
            <ul class="info-list">
                <li><strong>簡介</strong> 純情可愛的撲克貓咪</li>
                <li><strong>名字</strong> 波克 Poker</li>
                <li><strong>毛毛工作室</strong> (尚未提供)</li>
            </ul>

            <div class="social-links">
                <a href="https://www.facebook.com/shengyang.xia" target="_blank" class="social-btn">

                    Facebook
                </a>
                <a href="https://x.com/togekids_xia?s=21&t=Furf1005fsHunBxZ2VBy_Q" target="_blank" class="social-btn">
                    <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
                    X (Twitter)
                </a>

        </div>
    </div>

</body>
</html>
