<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>波克 POKER | 純情可愛的撲克貓咪</title>
    <style>
        /* CSS 變數：定義明亮銀白主題色 */
        :root {
            --bg-light: #f8fafc; /* 亮白底色 */
            --silver-gradient-1: #e2e8f0; 
            --silver-gradient-2: #f1f5f9;
            --text-main: #1e293b; /* 深曜石灰，確保文字極度清晰 */
            --text-highlight: #334155; 
            --accent-silver: #94a3b8; /* 點綴用的銀灰色 */
            --card-bg: rgba(255, 255, 255, 0.65); /* 半透明亮色毛玻璃 */
        }

        /* 基礎設定與重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang TC', 'Heiti TC', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            /* 珍珠質感的銀白漸層背景 */
            background-image: 
                radial-gradient(circle at 15% 15%, #ffffff 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, var(--silver-gradient-1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, var(--silver-gradient-2) 0%, var(--bg-light) 100%);
            color: var(--text-main);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 3rem 1rem;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem; 
        }

        /* 👑 標題樣式 */
        .hero-title {
            text-align: center;
            animation: slideDownFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 10;
        }

        .hero-title h1 {
            font-size: clamp(3.5rem, 8vw, 6rem); 
            font-weight: 900; 
            letter-spacing: -2px; 
            line-height: 1;
            margin-bottom: 0.5rem;
            
            /* 深金屬質感的文字漸層，確保在白底上非常顯眼 */
            background: linear-gradient(135deg, #0f172a 0%, #475569 45%, #1e293b 50%, #475569 55%, #0f172a 100%);
            background-size: 200% auto;
            color: var(--text-main); /* Fallback */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 5s linear infinite;

            /* 淺色柔和陰影，增加立體感而不髒亂 */
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .hero-title p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--accent-silver);
            font-weight: 800;
            letter-spacing: clamp(4px, 1.5vw, 10px); 
            text-transform: uppercase;
            margin-top: 5px;
            margin-left: 10px; 
        }

        /* 📸 中間圖片區塊：純漂浮 */
        .image-showcase {
            position: relative;
            width: 100%;
            max-width: 550px; 
            aspect-ratio: 1 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            opacity: 1; 
            animation: floatOnly 6s ease-in-out infinite;
            pointer-events: none; 
            will-change: transform; 
        }

        /* 大圖背後的柔和白光暈，讓去背圖更立體 */
        .image-showcase::before {
            content: '';
            position: absolute;
            width: 75%;
            height: 75%;
            background: #ffffff;
            filter: blur(60px);
            opacity: 0.8;
            border-radius: 50%;
            z-index: -1;
        }

        .character-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* 調整陰影為適合淺色背景的深灰陰影 */
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.15));
        }

        /* 📝 亮色玻璃擬態資訊卡片 */
        .info-card {
            background: var(--card-bg);
            -webkit-backdrop-filter: blur(25px);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            padding: clamp(1.5rem, 5vw, 3rem); 
            width: 100%;
            max-width: 700px;
            /* 柔和的卡片外陰影 */
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 20px rgba(255, 255, 255, 0.5) inset;
            
            animation: slideUpFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            animation-delay: 0.3s;
            z-index: 10;
        }

        .info-card h2 {
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 800;
            color: var(--text-highlight);
            margin-bottom: clamp(1.5rem, 4vw, 2rem);
            border-left: 5px solid var(--accent-silver); 
            padding-left: 1rem;
            line-height: 1;
        }

        /* 🔄 自我介紹欄位 */
        .info-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .info-list li {
            display: flex;
            align-items: center;
            font-size: clamp(1.05rem, 2.5vw, 1.2rem);
            padding: 1.2rem 1.5rem;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid transparent;
            color: var(--text-main);
            font-weight: 500;
            line-height: 1.6;
            
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: default;
        }

        .info-list li:hover {
            background: rgba(255, 255, 255, 0.9); 
            border-color: rgba(148, 163, 184, 0.3); 
            transform: translateX(8px) scale(1.01);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .info-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: var(--text-highlight);
            transition: width 0.3s ease;
        }

        @media (hover: hover) {
            .info-list li:hover::before {
                width: 4px;
            }
        }

        .info-list strong {
            color: var(--text-highlight);
            width: 140px;
            flex-shrink: 0;
            font-weight: 800;
            transition: color 0.3s ease;
        }

        /* 社群按鈕區塊 */
        .social-links {
            margin-top: clamp(1.5rem, 4vw, 2.5rem);
            display: flex;
            gap: 1.2rem;
            justify-content: flex-start;
            flex-wrap: wrap; 
        }

        .social-btn {
            text-decoration: none;
            color: var(--text-highlight);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.4);
            /* 按鈕陰影 */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
            flex: 1 1 auto; 
            min-width: 150px; 
            z-index: 1;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--text-main);
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        @media (hover: hover) {
            .social-btn:hover {
                transform: translateY(-5px);
                color: #ffffff; /* Hover 時文字變白 */
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
                border-color: transparent;
            }
            .social-btn:hover::before {
                opacity: 1; /* 背景變深灰 */
            }
        }

        /* RWD 調整 */
        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            .info-list li { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 0.5rem; 
                padding: 1.2rem; 
            }
            .info-list strong { 
                width: 100%; 
                border-bottom: 2px solid rgba(0,0,0,0.05); 
                padding-bottom: 0.4rem;
                margin-bottom: 0.2rem;
            }
        }

        @media (max-width: 380px) {
            .social-links { flex-direction: column; }
            .social-btn { width: 100%; }
        }

        /* 動畫 */
        @keyframes slideDownFade {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        @keyframes floatOnly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="image-showcase">
            <img src="profile.png" alt="波克 Poker 純情可愛的撲克貓咪" class="character-img">

</body>
